<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1565C0">
  <title>همراه ناظر</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    /* ───── Design Tokens ───── */
    :root {
      --bg:         #f0f4f9;
      --surface:    #ffffff;
      --surface2:   #e8edf4;
      --text:       #1a2233;
      --text-muted: #6b7a99;
      --primary:    #1565c0;
      --primary-dk: #0d47a1;
      --success:    #2e7d32;
      --warning:    #e65100;
      --danger:     #c62828;
      --border:     #d0d9e8;
      --nav-h:      52px;
      --tab-h:      50px;
      --panel-h:    44vh;
      --radius:     12px;
      --shadow:     0 2px 12px rgba(0,0,0,.10);
    }
    [data-theme="dark"] {
      --bg:         #0f1420;
      --surface:    #1a2233;
      --surface2:   #232d42;
      --text:       #e4eaf5;
      --text-muted: #8896b3;
      --border:     #2d3a55;
    }

    /* ───── Reset ───── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Vazirmatn', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: background .3s, color .3s;
    }

    /* ───── Header ───── */
    header {
      height: var(--nav-h);
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      flex-shrink: 0;
      z-index: 500;
    }
    .header-title { font-weight: 700; font-size: .95rem; display:flex; align-items:center; gap:7px; }
    .header-actions { display:flex; gap:10px; align-items:center; }
    .btn-icon { background:none; border:none; color:#fff; font-size:1.15rem; cursor:pointer; padding:5px; border-radius:6px; }
    .btn-icon:hover { background:rgba(255,255,255,.15); }

    /* ───── Tab Bar ───── */
    .tab-bar {
      height: var(--tab-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
      z-index: 400;
    }
    .tab-btn {
      flex: 1;
      border: none;
      background: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: .78rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      border-bottom: 3px solid transparent;
      transition: color .2s, border-color .2s;
    }
    .tab-btn i { font-size: 1.05rem; }
    .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ───── Screens ───── */
    .screen { flex:1; display:none; flex-direction:column; overflow:hidden; }
    .screen.active { display:flex; }

    /* ───── Login ───── */
    #screen-login {
      justify-content: center;
      align-items: center;
      background: var(--bg);
    }
    .login-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px 24px;
      width: 88%;
      max-width: 340px;
      box-shadow: var(--shadow);
    }
    .login-card h3 { color: var(--primary); text-align:center; margin-bottom:22px; font-size:1.1rem; }
    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-size:.82rem; margin-bottom:5px; color:var(--text-muted); }
    .form-group input {
      width:100%; padding:10px 12px;
      border:1px solid var(--border);
      border-radius:8px;
      background:var(--bg);
      color:var(--text);
      font-family:inherit;
      font-size:.9rem;
      outline:none;
      transition: border-color .2s;
    }
    .form-group input:focus { border-color: var(--primary); }
    .btn-block {
      width:100%; padding:12px;
      background:var(--primary);
      color:#fff;
      border:none; border-radius:8px;
      font-weight:700; font-size:.95rem;
      cursor:pointer; font-family:inherit;
      transition: background .2s;
    }
    .btn-block:hover { background: var(--primary-dk); }

    /* ───── Map Screen ───── */
    #screen-map {
      position: relative;
    }
    #map {
      flex: 1;
      min-height: 0;
      z-index: 1;
    }

    /* ───── Navigation HUD (روی نقشه) ───── */
    #nav-hud {
      position: absolute;
      top: 10px;
      right: 10px;
      left: 10px;
      z-index: 300;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .hud-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 10px 14px;
      box-shadow: var(--shadow);
      pointer-events: auto;
      border: 1px solid var(--border);
    }
    .hud-dest {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .hud-dest-icon { font-size:1.3rem; flex-shrink:0; }
    .hud-dest-info { flex:1; min-width:0; }
    .hud-dest-name { font-weight:700; font-size:.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .hud-dest-dist { font-size:.75rem; color:var(--text-muted); margin-top:1px; }
    .hud-action-row { display:flex; gap:6px; margin-top:8px; }
    .hud-btn {
      flex:1; padding:7px 6px;
      border:none; border-radius:8px;
      font-family:inherit; font-size:.75rem; font-weight:700;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px;
    }
    .hud-btn.done  { background:var(--success); color:#fff; }
    .hud-btn.review{ background:var(--warning); color:#fff; }
    .hud-btn.done:disabled { background:#a5d6a7; cursor:not-allowed; }
    .hud-btn.voice { background: var(--primary); color:#fff; }
    #nav-compass {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .8rem;
    }
    .compass-arrow {
      font-size: 1.6rem;
      transition: transform .4s ease;
      display: inline-block;
    }
    .compass-info { flex:1; }
    .compass-bearing { font-weight:700; font-size:.9rem; }
    .compass-eta { color:var(--text-muted); font-size:.75rem; }

    /* ───── Bottom Panel (Map) ───── */
    #map-panel {
      max-height: var(--panel-h);
      overflow-y: auto;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 10px;
      flex-shrink: 0;
      z-index: 200;
    }
    .upload-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 18px;
      text-align: center;
      color: var(--text-muted);
    }
    .upload-zone label { cursor:pointer; display:block; }
    .upload-zone i { font-size: 2rem; display:block; margin-bottom:8px; color:var(--primary); }
    .upload-zone input { display:none; }
    .upload-hint { font-size:.7rem; margin-top:6px; color:var(--text-muted); }

    .chip-scroll { display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none; }
    .chip-scroll::-webkit-scrollbar { display:none; }
    .loc-chip {
      padding: 5px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      white-space: nowrap;
      font-size: .75rem;
      cursor: pointer;
      transition: all .2s;
      flex-shrink: 0;
    }
    .loc-chip.active  { background:var(--primary);  color:#fff; border-color:var(--primary); }
    .loc-chip.done    { background:var(--success);   color:#fff; border-color:var(--success); }
    .loc-chip.review  { background:var(--warning);   color:#fff; border-color:var(--warning); }

    .detail-card {
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-top: 8px;
    }
    .detail-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .detail-name { font-weight:700; font-size:.9rem; }
    .status-badge {
      padding: 2px 9px;
      border-radius: 20px;
      font-size: .68rem;
      font-weight: 700;
    }
    .s-pending { background:#fff8e1; color:#f57f17; }
    .s-done    { background:#e8f5e9; color:#2e7d32; }
    .s-review  { background:#fff3e0; color:#e65100; }
    [data-theme="dark"] .s-pending { background:#3e2c00; color:#ffcc02; }
    [data-theme="dark"] .s-done    { background:#0d3318; color:#69f0ae; }
    [data-theme="dark"] .s-review  { background:#3e1500; color:#ffab40; }

    .detail-desc { font-size:.75rem; color:var(--text-muted); margin-bottom:8px; }
    .img-row { display:flex; gap:6px; margin-bottom:8px; overflow-x:auto; }
    .thumb {
      width:58px; height:58px; border-radius:8px;
      object-fit:cover; border:1px solid var(--border);
      cursor:pointer; flex-shrink:0; background:var(--surface);
    }
    .note-area {
      width:100%; padding:7px 10px;
      border:1px solid var(--border);
      border-radius:8px;
      background:var(--bg);
      color:var(--text);
      font-family:inherit;
      font-size:.78rem;
      resize:none;
      height:46px;
    }
    .note-area:focus { outline:none; border-color:var(--primary); }

    /* Reset button */
    .btn-reset {
      width:100%; margin-top:8px;
      padding:8px; border:1.5px solid var(--border);
      border-radius:8px; background:none;
      color:var(--text-muted); font-family:inherit;
      font-size:.78rem; cursor:pointer;
    }
    .btn-reset:hover { border-color:var(--danger); color:var(--danger); }

    /* ───── Timer Bar ───── */
    .timer-bar {
      display:flex; justify-content:space-between; align-items:center;
      background:var(--surface2); border-radius:8px;
      padding:7px 12px; margin-bottom:8px;
    }
    .timer-label { font-size:.7rem; color:var(--text-muted); }
    .timer-digits { font-family:monospace; font-size:1rem; font-weight:700; letter-spacing:.05em; }
    .timer-btns { display:flex; gap:6px; }
    .btn-sm {
      padding:4px 10px; border:none; border-radius:6px;
      font-family:inherit; font-size:.72rem; font-weight:700; cursor:pointer;
      display:flex; align-items:center; gap:4px;
    }
    .btn-sm.pause  { background:var(--warning); color:#fff; }
    .btn-sm.pdf    { background:var(--primary); color:#fff; }

    /* ───── Report Screen ───── */
    #screen-report {
      overflow-y: auto;
      padding: 14px;
      gap: 12px;
    }
    .report-header {
      background: var(--primary);
      color: #fff;
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .report-header h3 { font-size:1rem; margin-bottom:4px; }
    .report-header p  { font-size:.78rem; opacity:.85; }
    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .stat-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 12px 10px;
      text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-num { font-size:1.6rem; font-weight:700; }
    .stat-num.done   { color:var(--success); }
    .stat-num.review { color:var(--warning); }
    .stat-num.pending{ color:var(--text-muted); }
    .stat-label { font-size:.68rem; color:var(--text-muted); margin-top:2px; }
    .progress-bar-wrap {
      background:var(--surface);
      border-radius:var(--radius);
      padding:12px 14px;
      box-shadow:var(--shadow);
    }
    .progress-bar-wrap label { font-size:.78rem; font-weight:700; display:flex; justify-content:space-between; margin-bottom:6px; }
    .prog-track { background:var(--surface2); border-radius:20px; height:10px; overflow:hidden; }
    .prog-fill  { height:100%; background:var(--success); border-radius:20px; transition:width .5s; }
    .report-list { display:flex; flex-direction:column; gap:7px; }
    .report-item {
      background:var(--surface);
      border-radius:10px;
      padding:10px 13px;
      display:flex;
      align-items:center;
      gap:10px;
      box-shadow:0 1px 4px rgba(0,0,0,.07);
    }
    .report-num {
      width:28px; height:28px; border-radius:50%;
      background:var(--primary); color:#fff;
      display:flex; align-items:center; justify-content:center;
      font-size:.7rem; font-weight:700; flex-shrink:0;
    }
    .report-item-info { flex:1; min-width:0; }
    .report-item-name { font-weight:700; font-size:.83rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .report-item-note { font-size:.72rem; color:var(--text-muted); margin-top:2px; }
    .report-item-status { font-size:.7rem; font-weight:700; flex-shrink:0; }
    .r-done   { color:var(--success); }
    .r-review { color:var(--warning); }
    .r-pending{ color:var(--text-muted); }

    /* ───── Toast ───── */
    #toast {
      position:fixed; bottom:70px; left:50%; transform:translateX(-50%);
      background:rgba(20,30,50,.9); color:#fff;
      padding:8px 18px; border-radius:24px;
      z-index:3000; font-size:.78rem;
      opacity:0; pointer-events:none;
      transition:opacity .25s;
      max-width:85vw; text-align:center;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    #toast.show { opacity:1; }

    /* ───── Map Markers ───── */
    .custom-div-icon { background:transparent; border:none; }
    .mc {
      width:30px; height:30px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:700; color:#fff;
      border:2.5px solid rgba(255,255,255,.9);
      box-shadow:0 2px 6px rgba(0,0,0,.3);
    }
    .mc.blue   { background:var(--primary,#1565c0); }
    .mc.orange { background:#f57c00; }
    .mc.green  { background:#2e7d32; }
    .mc.grey   { background:#757575; }

    /* user dot */
    .user-dot {
      width:16px; height:16px; background:#e53935;
      border-radius:50%; border:3px solid #fff;
      box-shadow:0 0 0 3px rgba(229,57,53,.35);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100%{ box-shadow:0 0 0 3px rgba(229,57,53,.35); }
      50%    { box-shadow:0 0 0 7px rgba(229,57,53,.1); }
    }

    /* route line */
    .leaflet-routing-container { display:none !important; }

    /* ───── Misc ───── */
    .hidden { display:none !important; }
    .section-title {
      font-size:.75rem; font-weight:700;
      color:var(--text-muted);
      text-transform:uppercase; letter-spacing:.06em;
      margin-bottom:6px;
    }

    /* Voice status indicator */
    #voice-status {
      position:absolute; bottom:8px; left:10px;
      background:var(--primary); color:#fff;
      border-radius:20px; padding:4px 10px;
      font-size:.7rem; font-weight:700;
      z-index:300; display:flex; align-items:center; gap:5px;
      opacity:0; transition:opacity .3s;
      pointer-events:none;
    }
    #voice-status.show { opacity:1; }
    .voice-dot { width:7px; height:7px; background:#69f0ae; border-radius:50%; animation:pulse2 1s infinite; }
    @keyframes pulse2 { 0%,100%{opacity:1;} 50%{opacity:.3;} }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- ═══════════════ HEADER ═══════════════ -->
<header>
  <div class="header-title">
    <i class="fas fa-map-marked-alt"></i> همراه ناظر
  </div>
  <div class="header-actions">
    <button class="btn-icon" id="theme-toggle" title="تغییر تم"><i class="fas fa-moon"></i></button>
    <button class="btn-icon hidden" id="logout-btn" title="خروج"><i class="fas fa-sign-out-alt"></i></button>
  </div>
</header>

<!-- ═══════════════ TAB BAR ═══════════════ -->
<nav class="tab-bar hidden" id="tab-bar">
  <button class="tab-btn active" data-tab="screen-map">
    <i class="fas fa-map"></i> نقشه
  </button>
  <button class="tab-btn" data-tab="screen-report">
    <i class="fas fa-chart-bar"></i> گزارش
  </button>
</nav>

<!-- ═══════════════ SCREEN: LOGIN ═══════════════ -->
<div class="screen active" id="screen-login">
  <div class="login-card">
    <h3>🔐 ورود به سیستم</h3>
    <div class="form-group">
      <label>نام کاربری</label>
      <input type="text" id="login-user" placeholder="نام کاربری را وارد کنید" autocomplete="off">
    </div>
    <div class="form-group">
      <label>رمز عبور</label>
      <input type="password" id="login-pass" placeholder="••••••">
    </div>
    <button class="btn-block" id="do-login">ورود</button>
  </div>
</div>

<!-- ═══════════════ SCREEN: MAP ═══════════════ -->
<div class="screen" id="screen-map" style="position:relative;">

  <!-- Navigation HUD (روی نقشه) -->
  <div id="nav-hud" class="hidden">
    <div class="hud-card" id="hud-dest-card">
      <div class="hud-dest">
        <div class="hud-dest-icon">📍</div>
        <div class="hud-dest-info">
          <div class="hud-dest-name" id="hud-name">—</div>
          <div class="hud-dest-dist" id="hud-dist">محاسبه...</div>
        </div>
      </div>
      <div class="hud-action-row">
        <button class="hud-btn done"   id="hud-done-btn">  <i class="fas fa-check"></i> انجام شد</button>
        <button class="hud-btn review" id="hud-review-btn"><i class="fas fa-exclamation-triangle"></i> بررسی</button>
        <button class="hud-btn voice"  id="hud-voice-btn"> <i class="fas fa-volume-up"></i></button>
      </div>
    </div>
    <div class="hud-card" id="hud-compass-card">
      <div id="nav-compass">
        <span class="compass-arrow" id="compass-arrow">⬆️</span>
        <div class="compass-info">
          <div class="compass-bearing" id="compass-bearing">بارگذاری...</div>
          <div class="compass-eta" id="compass-eta">—</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Voice status -->
  <div id="voice-status"><div class="voice-dot"></div> <span id="voice-text">در حال خواندن...</span></div>

  <!-- Map -->
  <div id="map"></div>

  <!-- Bottom panel -->
  <div id="map-panel">

    <!-- Upload zone -->
    <div id="upload-section">
      <div class="upload-zone">
        <label for="excel-file">
          <i class="fas fa-file-excel"></i>
          آپلود فایل اکسل یا CSV
          <input type="file" id="excel-file" accept=".csv,.xlsx,.xls">
        </label>
        <div class="upload-hint">ترتیب ستون‌ها: name, lon, lat, توضیحات, img1, img2, img3</div>
      </div>
    </div>

    <!-- Inspection section -->
    <div id="inspection-section" class="hidden">

      <!-- Timer -->
      <div class="timer-bar">
        <div>
          <div class="timer-label">⏱ زمان کل</div>
          <div class="timer-digits" id="total-timer">00:00:00</div>
        </div>
        <div class="timer-btns">
          <button class="btn-sm pause" id="pause-resume-btn"><i class="fas fa-pause"></i> <span>توقف</span></button>
          <button class="btn-sm pdf"   id="finish-inspection-btn"><i class="fas fa-file-pdf"></i> PDF</button>
        </div>
      </div>

      <!-- Location chips -->
      <div class="section-title">نقاط بازرسی</div>
      <div class="chip-scroll" id="target-chips"></div>

      <!-- Detail card -->
      <div class="detail-card" id="detail-card">
        <div class="detail-header">
          <div class="detail-name" id="loc-name">انتخاب نقطه...</div>
          <span class="status-badge s-pending" id="loc-status">در انتظار</span>
        </div>
        <div class="detail-desc" id="loc-desc"></div>
        <div class="img-row" id="loc-images"></div>
        <div id="inspector-inputs" class="hidden">
          <textarea class="note-area" id="loc-note" placeholder="📝 یادداشت..."></textarea>
        </div>
      </div>

      <button class="btn-reset" id="reset-track-btn"><i class="fas fa-trash-alt"></i> حذف و آپلود جدید</button>
    </div>
  </div>
</div>

<!-- ═══════════════ SCREEN: REPORT ═══════════════ -->
<div class="screen" id="screen-report" style="display:none;">
  <div class="report-header">
    <h3 id="rpt-title">گزارش بازرسی</h3>
    <p id="rpt-subtitle">هنوز داده‌ای بارگذاری نشده</p>
  </div>
  <div class="stats-row" id="rpt-stats">
    <div class="stat-card"><div class="stat-num done"    id="s-done">۰</div><div class="stat-label">انجام شده</div></div>
    <div class="stat-card"><div class="stat-num review"  id="s-review">۰</div><div class="stat-label">نیاز به بررسی</div></div>
    <div class="stat-card"><div class="stat-num pending" id="s-pending">۰</div><div class="stat-label">باقی‌مانده</div></div>
  </div>
  <div class="progress-bar-wrap">
    <label>پیشرفت کلی <span id="rpt-pct">۰٪</span></label>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="section-title" style="margin-top:4px;">جزئیات نقاط</div>
  <div class="report-list" id="rpt-list"></div>
</div>


<!-- ═══════════════ SCRIPTS ═══════════════ -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
'use strict';

// ─── Service Worker ───
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ─── Constants ───
const USERS_DB = { "Mehdi": "2525800", "Ali": "2078" };
const YAZD_CENTER = [31.8974, 54.3569];
const OSRM_BASE   = 'https://router.project-osrm.org/route/v1/driving';

// ─── State ───
const state = {
  user:           null,
  locations:      [],
  selectedIdx:    null,
  currentNavIdx:  null,   // هدف فعلی ناوبری
  userLat:        null,
  userLon:        null,
  totalSeconds:   0,
  isPaused:       false,
  voiceEnabled:   true,
  timerInterval:  null,
  routeLayer:     null,
};

// ─── Map ───
let map, markersGroup, userMarker;

// ─── DOM refs ───
const $ = id => document.getElementById(id);

const loginScreen    = $('screen-login');
const mapScreen      = $('screen-map');
const reportScreen   = $('screen-report');
const tabBar         = $('tab-bar');
const logoutBtn      = $('logout-btn');
const themeToggle    = $('theme-toggle');
const uploadSection  = $('upload-section');
const inspSection    = $('inspection-section');
const targetChips    = $('target-chips');
const totalTimerEl   = $('total-timer');
const pauseResumeBtn = $('pause-resume-btn');
const navHud         = $('nav-hud');

// ═══════════════════════════════════════════════════
//  THEME
// ═══════════════════════════════════════════════════
themeToggle.addEventListener('click', () => {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
  themeToggle.innerHTML = dark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
});

// ═══════════════════════════════════════════════════
//  TAB BAR
// ═══════════════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const target = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.screen').forEach(s => {
      s.classList.remove('active');
      s.style.display = 'none';
    });
    const scr = $(target);
    scr.style.display = 'flex';
    scr.classList.add('active');
    if (target === 'screen-report') renderReport();
    if (target === 'screen-map' && map) setTimeout(() => map.invalidateSize(), 50);
  });
});

// ═══════════════════════════════════════════════════
//  LOGIN
// ═══════════════════════════════════════════════════
$('do-login').addEventListener('click', handleLogin);
$('login-pass').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

function handleLogin() {
  const user = $('login-user').value.trim();
  const pass = $('login-pass').value;
  if (USERS_DB[user] && USERS_DB[user] === pass) {
    state.user = user;
    localStorage.setItem('hn_user', user);
    startApp();
  } else {
    showToast('❌ نام کاربری یا رمز اشتباه است');
  }
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('hn_user');
  if (saved && USERS_DB[saved]) { state.user = saved; startApp(); }
});

logoutBtn.addEventListener('click', () => {
  localStorage.removeItem('hn_user');
  location.reload();
});

// ═══════════════════════════════════════════════════
//  APP INIT
// ═══════════════════════════════════════════════════
function startApp() {
  loginScreen.classList.remove('active');
  loginScreen.style.display = 'none';
  tabBar.classList.remove('hidden');
  mapScreen.style.display = 'flex';
  mapScreen.classList.add('active');
  logoutBtn.classList.remove('hidden');

  initMap();
  loadSavedData();
  startUserTracking();
}

function initMap() {
  if (map) return;
  map = L.map('map', { zoomControl: true, attributionControl: false }).setView(YAZD_CENTER, 13);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    subdomains: 'abcd', maxZoom: 19
  }).addTo(map);
  markersGroup = L.layerGroup().addTo(map);
}

// ═══════════════════════════════════════════════════
//  PERSISTENCE
// ═══════════════════════════════════════════════════
function saveData() {
  if (!state.user) return;
  localStorage.setItem(`hn_data_${state.user}`, JSON.stringify({
    locations:      state.locations,
    totalSeconds:   state.totalSeconds,
    currentNavIdx:  state.currentNavIdx,
    selectedIdx:    state.selectedIdx,
  }));
}

function loadSavedData() {
  const raw = localStorage.getItem(`hn_data_${state.user}`);
  if (!raw) return;
  const d = JSON.parse(raw);
  state.locations     = d.locations     || [];
  state.totalSeconds  = d.totalSeconds  || 0;
  state.currentNavIdx = d.currentNavIdx ?? null;
  state.selectedIdx   = d.selectedIdx   ?? null;
  if (state.locations.length > 0) {
    showInspectionUI();
    startTimer();
    renderAll();
    if (state.currentNavIdx !== null) updateNavHUD(state.currentNavIdx);
  }
}

// ═══════════════════════════════════════════════════
//  FILE UPLOAD
// ═══════════════════════════════════════════════════
$('excel-file').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const data = new Uint8Array(ev.target.result);
    const wb   = XLSX.read(data, { type: 'array' });
    const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });
    processExcelData(json);
  };
  reader.readAsArrayBuffer(file);
});

function extractNum(name) {
  if (!name) return null;
  const m = name.toString().match(/\d+/g);
  if (m && m.length) {
    const n = parseInt(m[0], 10);
    return Math.min(Math.max(n, 0), 999);
  }
  return null;
}

function processExcelData(rows) {
  const startIdx = (rows[0] && isNaN(Number(rows[0][1]))) ? 1 : 0;
  const locs = [];
  for (let i = startIdx; i < rows.length; i++) {
    const r = rows[i];
    if (!r[0] || r[1] == null || r[2] == null) continue;
    const name = r[0].toString();
    locs.push({
      id:   'loc_' + i,
      name,
      lon:  parseFloat(r[1]),
      lat:  parseFloat(r[2]),
      desc: r[3] || '',
      img1: r[4] || '',
      img2: r[5] || '',
      img3: r[6] || '',
      status: 'pending',
      note:   '',
      bookmarkNum: extractNum(name),
    });
  }

  if (locs.length === 0) { showToast('❌ فرمت فایل معتبر نیست'); return; }

  state.locations = locs;
  state.selectedIdx   = null;
  state.currentNavIdx = null;

  // مرتب‌سازی بر اساس نزدیک‌ترین به کاربر (اگر موقعیت داریم)
  pickNextTarget();
  showInspectionUI();
  startTimer();
  saveData();
  renderAll();
  showToast(`✅ ${locs.length} نقطه بارگذاری شد`);
}

// ═══════════════════════════════════════════════════
//  NAVIGATION TARGET LOGIC
// ═══════════════════════════════════════════════════
function pickNextTarget() {
  // پیدا کن نزدیک‌ترین نقطه pending به کاربر
  const pending = state.locations
    .map((loc, idx) => ({ loc, idx }))
    .filter(({ loc }) => loc.status === 'pending');

  if (pending.length === 0) {
    state.currentNavIdx = null;
    navHud.classList.add('hidden');
    showToast('🎉 همه نقاط بازرسی شدند!');
    speak('همه نقاط بازرسی شدند. عملیات پایان یافت.');
    return;
  }

  if (state.userLat !== null && state.userLon !== null) {
    pending.sort((a, b) =>
      haversine(state.userLat, state.userLon, a.loc.lat, a.loc.lon) -
      haversine(state.userLat, state.userLon, b.loc.lat, b.loc.lon)
    );
  }

  const next = pending[0];
  state.currentNavIdx = next.idx;
  state.selectedIdx   = next.idx;
  updateNavHUD(next.idx);
  drawRoute(next.idx);
  renderAll();
}

function updateNavHUD(idx) {
  const loc = state.locations[idx];
  if (!loc) return;
  navHud.classList.remove('hidden');

  const displayNum = loc.bookmarkNum !== null ? loc.bookmarkNum : (idx + 1);
  $('hud-name').textContent = `[${displayNum}] ${loc.name}`;

  // فاصله
  if (state.userLat !== null) {
    const d = haversine(state.userLat, state.userLon, loc.lat, loc.lon);
    $('hud-dist').textContent = formatDist(d);
    updateCompass(loc.lat, loc.lon);
  } else {
    $('hud-dist').textContent = 'موقعیت شما نامشخص';
  }

  // دکمه done: اگر done شده، غیرفعال
  const doneBtn = $('hud-done-btn');
  if (loc.status !== 'pending') {
    doneBtn.disabled = true;
    doneBtn.style.opacity = '0.5';
  } else {
    doneBtn.disabled = false;
    doneBtn.style.opacity = '1';
  }
}

// ─── هر بار موقعیت آپدیت شد HUD هم آپدیت می‌شه ───
function onUserPositionUpdate() {
  if (state.currentNavIdx !== null) updateNavHUD(state.currentNavIdx);
  updateCompass(
    state.currentNavIdx !== null ? state.locations[state.currentNavIdx]?.lat : null,
    state.currentNavIdx !== null ? state.locations[state.currentNavIdx]?.lon : null,
  );
}

// ═══════════════════════════════════════════════════
//  STATUS UPDATE
// ═══════════════════════════════════════════════════
$('hud-done-btn').addEventListener('click',   () => updateStatus('done'));
$('hud-review-btn').addEventListener('click', () => updateStatus('review'));
$('hud-voice-btn').addEventListener('click',  () => {
  if (state.currentNavIdx !== null) {
    const loc = state.locations[state.currentNavIdx];
    const d = state.userLat !== null
      ? formatDist(haversine(state.userLat, state.userLon, loc.lat, loc.lon))
      : 'فاصله نامشخص';
    speak(`هدف: ${loc.name}، فاصله: ${d}`);
  }
});

function updateStatus(newStatus) {
  const idx = state.currentNavIdx;
  if (idx === null) return;
  const loc = state.locations[idx];
  if (loc.status !== 'pending' && newStatus === 'done') {
    showToast('این نقطه قبلاً ثبت شده است');
    return;
  }
  loc.status = newStatus;
  loc.note   = $('loc-note').value;

  // دکمه done رو غیرفعال کن
  $('hud-done-btn').disabled = true;
  $('hud-done-btn').style.opacity = '0.5';

  saveData();
  renderAll();
  const msg = newStatus === 'done' ? '✅ انجام شد' : '⚠️ نیاز به بررسی';
  showToast(msg);

  // بعد از ۰.۸ ثانیه رفتن به هدف بعدی
  setTimeout(() => {
    removeRoute();
    pickNextTarget();
    saveData();
    renderAll();
  }, 800);
}

// ═══════════════════════════════════════════════════
//  ROUTE (OSRM)
// ═══════════════════════════════════════════════════
async function drawRoute(destIdx) {
  removeRoute();
  if (state.userLat === null) return;
  const dest = state.locations[destIdx];
  if (!dest) return;

  try {
    const url = `${OSRM_BASE}/${state.userLon},${state.userLat};${dest.lon},${dest.lat}?overview=full&geometries=geojson`;
    const res  = await fetch(url);
    const json = await res.json();
    if (json.code !== 'Ok') return;

    const coords  = json.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
    const distM   = json.routes[0].distance;
    const durSec  = json.routes[0].duration;

    state.routeLayer = L.polyline(coords, {
      color: '#1565c0', weight: 5, opacity: 0.75, lineJoin: 'round'
    }).addTo(map);

    $('hud-dist').textContent   = formatDist(distM);
    $('compass-eta').textContent = `⏱ ${formatDuration(durSec)} پیاده`;

    // صدا
    speak(`به مقصد ${dest.name} حرکت کنید. فاصله ${formatDist(distM)}.`);

  } catch (err) {
    // اگه اینترنت نبود fallback به خط مستقیم
    const dest = state.locations[destIdx];
    if (state.userLat !== null) {
      state.routeLayer = L.polyline(
        [[state.userLat, state.userLon], [dest.lat, dest.lon]],
        { color: '#1565c0', weight: 4, opacity: 0.6, dashArray: '8,8' }
      ).addTo(map);
    }
  }
}

function removeRoute() {
  if (state.routeLayer) { state.routeLayer.remove(); state.routeLayer = null; }
}

// ═══════════════════════════════════════════════════
//  COMPASS & DISTANCE
// ═══════════════════════════════════════════════════
function updateCompass(destLat, destLon) {
  if (destLat === null || destLon === null || state.userLat === null) return;
  const bearing  = getBearing(state.userLat, state.userLon, destLat, destLon);
  const dirLabel = bearingToFarsi(bearing);
  $('compass-bearing').textContent = `${dirLabel} (${Math.round(bearing)}°)`;
  $('compass-arrow').style.transform = `rotate(${bearing}deg)`;
}

function getBearing(lat1, lon1, lat2, lon2) {
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const Δλ = (lon2 - lon1) * Math.PI / 180;
  const y = Math.sin(Δλ) * Math.cos(φ2);
  const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function bearingToFarsi(b) {
  const dirs = ['شمال','شمال‌شرق','شرق','جنوب‌شرق','جنوب','جنوب‌غرب','غرب','شمال‌غرب'];
  return dirs[Math.round(b / 45) % 8];
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000, dLat = (lat2-lat1)*Math.PI/180, dLon = (lon2-lon1)*Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(m) {
  return m >= 1000 ? `${(m/1000).toFixed(1)} کیلومتر` : `${Math.round(m)} متر`;
}

function formatDuration(sec) {
  const m = Math.round(sec / 60);
  return m < 60 ? `${m} دقیقه` : `${Math.floor(m/60)} ساعت ${m%60} دقیقه`;
}

// ═══════════════════════════════════════════════════
//  USER TRACKING
// ═══════════════════════════════════════════════════
function startUserTracking() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(
    pos => {
      const { latitude: lat, longitude: lon } = pos.coords;
      const isFirst = state.userLat === null;
      state.userLat = lat;
      state.userLon = lon;

      // نشان‌دهنده کاربر روی نقشه
      const userIcon = L.divIcon({ html: '<div class="user-dot"></div>', className: '', iconSize: [16,16], iconAnchor: [8,8] });
      if (userMarker) { userMarker.setLatLng([lat, lon]); }
      else { userMarker = L.marker([lat, lon], { icon: userIcon, zIndexOffset: 1000 }).addTo(map).bindPopup('📍 موقعیت شما'); }

      if (isFirst && state.locations.length > 0) {
        pickNextTarget();
        map.setView([lat, lon], 15);
      }

      onUserPositionUpdate();
    },
    err => console.warn('GPS:', err.message),
    { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
  );
}

// ═══════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════
function renderAll() {
  renderChips();
  renderMarkers();
  renderDetailPanel();
}

function renderChips() {
  targetChips.innerHTML = '';
  state.locations.forEach((loc, idx) => {
    const num   = loc.bookmarkNum !== null ? loc.bookmarkNum : (idx + 1);
    const chip  = document.createElement('div');
    const isCur = idx === state.currentNavIdx;
    const cls   = loc.status === 'done' ? 'done' : loc.status === 'review' ? 'review' : (isCur ? 'active' : '');
    chip.className = `loc-chip ${cls}`;
    chip.textContent = `${num}`;
    chip.title = loc.name;
    chip.addEventListener('click', () => { state.selectedIdx = idx; renderAll(); });
    targetChips.appendChild(chip);
  });
}

function renderMarkers() {
  if (!markersGroup) return;
  markersGroup.clearLayers();
  state.locations.forEach((loc, idx) => {
    const num = loc.bookmarkNum !== null ? loc.bookmarkNum : (idx + 1);
    const colorClass =
      loc.status === 'done'   ? 'green'  :
      loc.status === 'review' ? 'grey'   :
      idx === state.currentNavIdx ? 'orange' : 'blue';

    const icon = L.divIcon({
      html: `<div class="mc ${colorClass}">${num}</div>`,
      className: 'custom-div-icon', iconSize: [30,30], iconAnchor: [15,15]
    });
    const m = L.marker([loc.lat, loc.lon], { icon }).addTo(markersGroup);
    m.on('click', () => { state.selectedIdx = idx; renderAll(); });
  });
}

function renderDetailPanel() {
  const idx = state.selectedIdx;
  if (idx === null || !state.locations[idx]) return;
  const loc = state.locations[idx];
  const num = loc.bookmarkNum !== null ? loc.bookmarkNum : (idx + 1);

  $('loc-name').innerHTML = `<i class="fas fa-map-pin"></i> [${num}] ${loc.name}`;
  $('loc-desc').textContent = loc.desc || 'بدون توضیحات';

  const badge = $('loc-status');
  if (loc.status === 'done') {
    badge.textContent = '✅ انجام شده';
    badge.className = 'status-badge s-done';
  } else if (loc.status === 'review') {
    badge.textContent = '⚠️ نیاز به بررسی';
    badge.className = 'status-badge s-review';
  } else {
    badge.textContent = '⏳ در انتظار';
    badge.className = 'status-badge s-pending';
  }

  // تصاویر (فقط اگه URL دارن)
  const gallery = $('loc-images');
  gallery.innerHTML = '';
  [loc.img1, loc.img2, loc.img3].filter(u => u && u.trim()).forEach(url => {
    const img = document.createElement('img');
    img.src = url; img.className = 'thumb'; img.loading = 'lazy';
    img.onerror = () => img.remove();
    img.onclick  = () => window.open(url, '_blank');
    gallery.appendChild(img);
  });

  $('inspector-inputs').classList.remove('hidden');
  const noteArea = $('loc-note');
  noteArea.value = loc.note || '';
  noteArea.oninput = e => { loc.note = e.target.value; saveData(); };
}

// ═══════════════════════════════════════════════════
//  REPORT SCREEN
// ═══════════════════════════════════════════════════
function renderReport() {
  const locs = state.locations;
  const done   = locs.filter(l => l.status === 'done').length;
  const review = locs.filter(l => l.status === 'review').length;
  const pending= locs.filter(l => l.status === 'pending').length;
  const total  = locs.length;
  const pct    = total ? Math.round((done + review) / total * 100) : 0;

  $('rpt-title').textContent   = `گزارش بازرسی — ${state.user || ''}`;
  $('rpt-subtitle').textContent = `زمان: ${totalTimerEl.textContent} | کل: ${total} نقطه`;
  $('s-done').textContent    = done;
  $('s-review').textContent  = review;
  $('s-pending').textContent = pending;
  $('rpt-pct').textContent   = `${pct}٪`;
  $('prog-fill').style.width = `${pct}%`;

  const list = $('rpt-list');
  list.innerHTML = '';
  locs.forEach((loc, idx) => {
    const num = loc.bookmarkNum !== null ? loc.bookmarkNum : (idx + 1);
    const statusText  = loc.status === 'done' ? '✅ انجام شده' : loc.status === 'review' ? '⚠️ بررسی' : '⏳ در انتظار';
    const statusClass = loc.status === 'done' ? 'r-done' : loc.status === 'review' ? 'r-review' : 'r-pending';
    const el = document.createElement('div');
    el.className = 'report-item';
    el.innerHTML = `
      <div class="report-num">${num}</div>
      <div class="report-item-info">
        <div class="report-item-name">${loc.name}</div>
        ${loc.note ? `<div class="report-item-note">📝 ${loc.note}</div>` : ''}
      </div>
      <div class="report-item-status ${statusClass}">${statusText}</div>
    `;
    list.appendChild(el);
  });
}

// ═══════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════
function startTimer() {
  if (state.timerInterval) return;
  state.timerInterval = setInterval(() => {
    if (state.isPaused) return;
    state.totalSeconds++;
    const h = String(Math.floor(state.totalSeconds / 3600)).padStart(2, '0');
    const m = String(Math.floor((state.totalSeconds % 3600) / 60)).padStart(2, '0');
    const s = String(state.totalSeconds % 60).padStart(2, '0');
    totalTimerEl.textContent = `${h}:${m}:${s}`;
    if (state.totalSeconds % 15 === 0) saveData();
  }, 1000);
}

pauseResumeBtn.addEventListener('click', () => {
  state.isPaused = !state.isPaused;
  if (state.isPaused) {
    pauseResumeBtn.innerHTML = '<i class="fas fa-play"></i> <span>ادامه</span>';
    pauseResumeBtn.className = 'btn-sm pause';
    pauseResumeBtn.style.background = 'var(--success)';
  } else {
    pauseResumeBtn.innerHTML = '<i class="fas fa-pause"></i> <span>توقف</span>';
    pauseResumeBtn.style.background = '';
  }
});

// ═══════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════
function showInspectionUI() {
  uploadSection.classList.add('hidden');
  inspSection.classList.remove('hidden');
}

$('reset-track-btn').addEventListener('click', () => {
  if (confirm('تمام داده‌ها حذف شوند؟')) {
    localStorage.removeItem(`hn_data_${state.user}`);
    location.reload();
  }
});

$('finish-inspection-btn').addEventListener('click', () => {
  saveData();
  generatePDF();
});

// ═══════════════════════════════════════════════════
//  PDF
// ═══════════════════════════════════════════════════
function generatePDF() {
  showToast('📄 در حال ساخت PDF...');
  const locs = state.locations;
  let rows = locs.map((loc, i) => {
    const num  = loc.bookmarkNum !== null ? loc.bookmarkNum : (i + 1);
    const stat = loc.status === 'done' ? 'انجام شده' : loc.status === 'review' ? 'نیاز به بررسی' : 'بازرسی نشده';
    return `<tr><td style="padding:7px;border-bottom:1px solid #ddd;">${num} - ${loc.name}</td><td style="padding:7px;border-bottom:1px solid #ddd;">${stat}</td><td style="padding:7px;border-bottom:1px solid #ddd;">${loc.note || '—'}</td></tr>`;
  }).join('');

  const el = document.createElement('div');
  el.style.cssText = 'padding:20px;direction:rtl;font-family:Vazirmatn,sans-serif;';
  el.innerHTML = `
    <div style="border:2px solid #1565c0;padding:16px;border-radius:8px;">
      <h2 style="text-align:center;color:#1565c0;margin-bottom:10px;">گزارش بازرسی</h2>
      <div style="display:flex;justify-content:space-between;margin-bottom:12px;font-size:13px;">
        <span><b>ناظر:</b> ${state.user}</span>
        <span><b>زمان کل:</b> ${totalTimerEl.textContent}</span>
        <span><b>تاریخ:</b> ${new Date().toLocaleDateString('fa-IR')}</span>
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead><tr style="background:#1565c0;color:#fff;">
          <th style="padding:8px;text-align:right;">نام</th>
          <th style="padding:8px;text-align:right;">وضعیت</th>
          <th style="padding:8px;text-align:right;">یادداشت</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
  html2pdf().from(el).set({
    margin: 8,
    filename: `Report_${state.user}_${new Date().toISOString().slice(0,10)}.pdf`,
    jsPDF: { orientation: 'portrait', format: 'a4' }
  }).save().then(() => showToast('✅ PDF ذخیره شد'));
}

// ═══════════════════════════════════════════════════
//  VOICE (Web Speech API - فارسی)
// ═══════════════════════════════════════════════════
let speechQueue = [];
let isSpeaking  = false;

function speak(text) {
  if (!window.speechSynthesis) return;
  speechQueue.push(text);
  if (!isSpeaking) processQueue();
}

function processQueue() {
  if (!speechQueue.length) { isSpeaking = false; hideVoiceStatus(); return; }
  isSpeaking = true;
  const text = speechQueue.shift();
  showVoiceStatus(text);

  const utt = new SpeechSynthesisUtterance(text);
  utt.lang  = 'fa-IR';
  utt.rate  = 1.0;
  utt.pitch = 1.0;

  // انتخاب صدای فارسی در صورت وجود
  const voices = window.speechSynthesis.getVoices();
  const faVoice = voices.find(v => v.lang.startsWith('fa'));
  if (faVoice) utt.voice = faVoice;

  utt.onend = () => { setTimeout(processQueue, 200); };
  utt.onerror = () => { isSpeaking = false; hideVoiceStatus(); processQueue(); };
  window.speechSynthesis.speak(utt);
}

function showVoiceStatus(text) {
  $('voice-text').textContent = text.substring(0, 40) + (text.length > 40 ? '...' : '');
  $('voice-status').classList.add('show');
}
function hideVoiceStatus() {
  $('voice-status').classList.remove('show');
}

// بارگذاری صداها
if (window.speechSynthesis) {
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

// ═══════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}
</script>
